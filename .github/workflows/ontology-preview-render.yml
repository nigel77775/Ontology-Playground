name: Ontology Preview Render

on:
  pull_request:
    branches: [main]
    paths:
      - 'catalogue/**/*.rdf'
      - 'catalogue/**/*.owl'
      - 'catalogue/**/metadata.json'
      - 'src/components/OntologyGraph.tsx'
      - 'scripts/list-changed-catalogue-entries.ts'
      - 'scripts/render-ontology-previews.ts'
      - '.github/workflows/ontology-preview-render.yml'

permissions:
  contents: read

jobs:
  render:
    if: github.repository == 'microsoft/Ontology-Playground'
    runs-on: ubuntu-latest
    steps:
      - name: Craft PoC manifest + placeholder image (non-destructive)
        run: |
          set -euo pipefail
          mkdir -p ontology-preview/images
          cat > ontology-preview/images/manifest.json <<EOF
          {
            "prNumber": 80,
            "headSha": "${{ github.event.pull_request.head.sha }}",
            "repository": "microsoft/Ontology-Playground",
            "previews": [{"id": "poc", "file": "poc.png", "bytes": 68}]
          }
          EOF
          base64 -d > ontology-preview/images/poc.png <<'B64'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=
          B64

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ontology-preview
          path: ontology-preview/images
          if-no-files-found: error
          retention-days: 14
